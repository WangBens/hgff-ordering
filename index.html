<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>凰貴妃茶堂 - 線上點餐</title>

<!-- ✅ 修正 LIFF -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- ✅ 修正 SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
  font-family: Arial;
  background: #fcf6f2;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
}

.header {
  text-align: center;
  color: #d35400;
  padding: 20px;
}

.category-title {
  background: #d35400;
  color: white;
  padding: 10px;
  margin-top: 15px;
}

.menu-item {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.menu-name {
  font-weight: bold;
}

.menu-price {
  color: red;
}

.btn-select {
  background: #f39c12;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 10px;
}

.cart-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: #2c3e50;
  color: white;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>凰貴妃茶堂</h2>
    <p>線上點餐系統</p>
  </div>

  <div id="menu-container">載入中...</div>

</div>

<div class="cart-bar">
  🛒 <span id="cart-count">0</span>
  <button onclick="checkout()">結帳</button>
</div>

<script>
const CUSTOMER_LIFF_ID = "2010243276-yKzFVFFC";
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxo41bcyyfmHkSV9hUDSmBwttT929G0_CQzVZ-Em_vsl0fwTrIgBclpVI3mqloX4l-0/exec";

let cart = [];
let menuData = [];

// ✅ 修正 fetch
async function callGAS(action, payload = {}) {
  payload.action = action;

  const res = await fetch(GAS_API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  return await res.json();
}

window.onload = async function () {
  try {
    await liff.init({ liffId: CUSTOMER_LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    loadMenu();

  } catch (e) {
    Swal.fire("錯誤", "LIFF 初始化失敗", "error");
  }
};

// ✅ 載入菜單
async function loadMenu() {
  try {
    const res = await callGAS("getMenuAndOptions");

    if (!res.success) throw res.message;

    menuData = res.data.menu;
    renderMenu();

  } catch (e) {
    Swal.fire("錯誤", "載入菜單失敗", "error");
  }
}

// ✅ 顯示菜單（含分類顏色）
function renderMenu() {
  const container = document.getElementById("menu-container");
  container.innerHTML = "";

  const grouped = {};
  menuData.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  for (let cat in grouped) {
    container.innerHTML += `<div class="category-title">${cat}</div>`;

    grouped[cat].forEach(item => {
      container.innerHTML += `
        <div class="menu-item">
          <div>
            <div class="menu-name">${item.name}</div>
            <div class="menu-price">L: $${item.priceL}</div>
          </div>
          <button class="btn-select" onclick="addToCart('${item.name}', ${item.priceL})">
            選擇
          </button>
        </div>
      `;
    });
  }
}

function addToCart(name, price) {
  cart.push({ name, price, qty: 1 });
  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;
}

function checkout() {
  if (cart.length === 0) {
    Swal.fire("提示", "購物車是空的", "warning");
    return;
  }

  Swal.fire("成功", "已送出訂單！", "success");
  cart = [];
  updateCart();
}
</script>

</body>
</html>
