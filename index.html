<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>凰貴妃茶堂 - 線上點餐</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { font-family: Arial, "Microsoft JhengHei", sans-serif; background: #fcf6f2; margin: 0; padding-bottom: 80px; color: #333; }
    body.has-cart { padding-bottom: 95px; }
    .container { max-width: 600px; margin: auto; background: white; min-height: 100vh; position: relative; }
    .header { text-align: center; color: #d35400; padding: 20px; border-bottom: 1px solid #eee; }
    .header h2 { margin-bottom: 5px; }
    .member-box { margin: 10px 15px; padding: 12px; background: #fff7ec; border-radius: 10px; border: 1px solid #f5d6a8; font-size: 14px; line-height: 1.6; }
    .member-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .member-info { flex: 1; word-break: break-word; }
    .history-btn { background: #3498db; color: white; border: none; padding: 8px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
    .join-btn { margin-top: 8px; background: #d35400; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .promo-box { margin: 10px 15px; padding: 12px; background: #eef9ff; border-left: 5px solid #3498db; border-radius: 8px; font-size: 14px; line-height: 1.6; }
    .combo-series-box { margin: 10px 15px; padding: 12px; background: #fff8e8; border-left: 5px solid #f39c12; border-radius: 10px; }
    .combo-series-title { font-weight: bold; color: #d35400; margin-bottom: 10px; font-size: 16px; }
    .combo-card { background: white; border: 1px solid #f5d6a8; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .combo-card-name { font-weight: bold; color: #2c3e50; line-height: 1.5; font-size: 15px; }
    .combo-card-price { color: #e74c3c; font-weight: bold; font-size: 18px; margin-top: 5px; }
    .combo-card-desc { font-size: 13px; color: #777; margin-top: 5px; line-height: 1.5; }
    .combo-btn { margin-top: 8px; width: 100%; border-radius: 8px; background-color: #d35400; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    .store-closed { margin: 15px; padding: 20px; background: #ffeaea; color: #c0392b; border-radius: 10px; text-align: center; font-weight: bold; }
    .category-title { background: #d35400; color: white; padding: 10px 15px; margin-top: 15px; font-weight: bold; }
    .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 10px; }
    .menu-name { font-weight: bold; font-size: 16px; }
    .menu-price { color: #e74c3c; font-size: 14px; margin-top: 5px; }
    .btn-select { background: #f39c12; color: white; border: none; padding: 9px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: white; display: none; justify-content: center; z-index: 999; box-shadow: 0 -3px 10px rgba(0,0,0,0.15); }
    .cart-inner { max-width: 640px; width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    .form-control { width: 100%; padding: 9px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
    .qty-control { display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 6px; }
    .qty-btn { width: 42px; height: 42px; border: none; border-radius: 50%; background: #d35400; color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
    .qty-value { min-width: 48px; text-align: center; font-size: 24px; font-weight: bold; color: #2c3e50; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>凰貴妃茶堂</h2>
      <p>線上點餐系統</p>
    </div>

    <div id="member-box" class="member-box">LINE 驗證中...</div>
    <div id="promo-area"></div>
    <div id="menu-container">載入中...</div>
    <div id="history-container"></div>
  </div>

  <div id="cart-bar" class="cart-bar">
    <div class="cart-inner">
      <div class="cart-summary">🛒 <span id="cart-count">0</span> 杯 ｜預估 $<span id="cart-total">0</span></div>
      <div class="cart-actions">
        <button class="cart-view-btn" style="background:#f39c12; border:none; color:white; padding:9px 12px; border-radius:8px;" onclick="openCartManager()">查看購物車</button>
        <button class="cart-btn" style="background:#2ecc71; border:none; color:white; padding:9px 12px; border-radius:8px;" onclick="checkout()">結帳</button>
      </div>
    </div>
  </div>

  <script>
    const CUSTOMER_LIFF_ID = "2010243276-yKzFVFFC";
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxo41bcyyfmHkSV9hUDSmBwttT929G0_CQzVZ-Em_vsl0fwTrIgBclpVI3mqloX4l-0/exec";

    // 這裡放入你之前完善的 initSystem, callGAS 等邏輯...
    // 確保這裡的變數名稱與你後端對接邏輯一致
    async function callGAS(action, payload = {}) {
      payload.action = action;
      payload.idToken = idToken; // 確保 idToken 已經在 onLoad 中取得
      const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
      return await res.json();
    }
    
    // 其餘邏輯保持與你最後一次成功的版本一致即可
    console.log("系統已載入");
  </script>
</body>
</html>
