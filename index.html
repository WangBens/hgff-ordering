    <script>
      // 系統核心變數
      const CUSTOMER_LIFF_ID = "2010243276-yKzFVFFC";
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw-EwGrE9UwFhUgl4ePZ1JhVrXoYsK0t5YD5YQkC6oc20DuY6GaUeR6ni3h1j_z_N4t/exec";

      let userProfile = { userId: "", displayName: "" };
      let sysData = { menu: [], options: {} };
      let currentItem = null; 
      let currentQty = 1;
      let cart = []; 

      // 呼叫 GAS 後端
      async function callGAS(action, payload = {}) {
        payload.action = action;
        const response = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
        return await response.json();
      }

      window.onload = function() {
        liff.init({ liffId: CUSTOMER_LIFF_ID }).then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              userProfile = profile;
              document.getElementById("welcome-msg").innerText = `哈囉，${profile.displayName}！想喝點什麼呢？`;
              document.getElementById("welcome-msg").style.display = "block";
              
              // 抓取菜單與個人訂單進度
              fetchData();
              fetchMyOrders(); 
              
              // 【新增】每 10 秒自動背景更新顧客的訂單狀態！
              setInterval(fetchMyOrders, 10000);
            });
          }
        });
      };

      // 抓取個人訂單進度
      function fetchMyOrders() {
        callGAS('getUserOrders', { userId: userProfile.userId }).then(res => {
          if(res.success && res.data.length > 0) {
            let html = "";
            res.data.forEach(o => {
              let tagClass = o.status === '未處理' ? 'tag-red' : (o.status === '已接單' ? 'tag-orange' : 'tag-blue');
              html += `
                <div class="my-order-item">
                  <div>${o.time} 訂單 ($${o.total})</div>
                  <div class="my-order-tag ${tagClass}">${o.status}</div>
                </div>`;
            });
            document.getElementById("my-orders-list").innerHTML = html;
            document.getElementById("my-orders-board").style.display = "block";
          } else {
            document.getElementById("my-orders-board").style.display = "none";
          }
        });
      }

      // 抓取菜單
      function fetchData() {
        callGAS('getMenuAndOptions').then(res => {
          if (res.success) {
            sysData = res.data;
            document.getElementById("status-text").style.display = "none";
            renderMenu();
          }
        });
      }

      // 渲染主畫面菜單
      function renderMenu() {
        const container = document.getElementById("menu-container");
        const grouped = {};
        
        sysData.menu.forEach(item => { 
          if (!grouped[item.category]) grouped[item.category] = []; 
          grouped[item.category].push(item); 
        });
        
        for (const cat in grouped) {
          container.innerHTML += `<div class="category-title">${cat}</div>`;
          grouped[cat].forEach(item => {
            let pText = [];
            if(item.priceL > 0) pText.push(`L:$${item.priceL}`);
            if(item.priceXL > 0) pText.push(`XL:$${item.priceXL}`);
            
            const itemJson = encodeURIComponent(JSON.stringify(item));
            container.innerHTML += `
              <div class="menu-item">
                <div>
                  <div class="menu-name">${item.name}</div>
                  <div class="menu-price">${pText.join(" | ")}</div>
                </div>
                <button class="btn-select" onclick="openCustomModal('${itemJson}')">選擇</button>
              </div>`;
          });
        }
      }

      // 開啟客製化視窗
      function openCustomModal(itemJsonStr) {
        currentItem = JSON.parse(decodeURIComponent(itemJsonStr));
        currentQty = 1;
        document.getElementById("item-qty").innerText = currentQty;
        document.getElementById("modal-item-name").innerText = currentItem.name;
        
        let html = "";
        
        // 尺寸
        html += `<div class="option-group"><div class="option-title">容量大小</div><div class="radio-grid">`;
        if (currentItem.priceL > 0) html += `<label class="radio-label"><input type="radio" name="size" value="L" data-price="${currentItem.priceL}" checked onchange="updateModalPrice()"><span>L杯</span></label>`;
        if (currentItem.priceXL > 0) {
            let checked = currentItem.priceL <= 0 ? "checked" : "";
            html += `<label class="radio-label"><input type="radio" name="size" value="XL" data-price="${currentItem.priceXL}" ${checked} onchange="updateModalPrice()"><span>XL杯</span></label>`;
        }
        html += `</div></div>`;

        // 甜度
        html += `<div class="option-group"><div class="option-title">甜度</div><div class="radio-grid">`;
        sysData.options.sweetness.forEach((opt, idx) => { 
          html += `<label class="radio-label"><input type="radio" name="sweetness" value="${opt.name}" ${idx===0?'checked':''}><span>${opt.name}</span></label>`; 
        });
        html += `</div></div>`;

        // 冰塊
        html += `<div class="option-group"><div class="option-title">冰塊</div><div class="radio-grid">`;
        sysData.options.ice.forEach((opt, idx) => { 
          html += `<label class="radio-label"><input type="radio" name="ice" value="${opt.name}" ${idx===0?'checked':''}><span>${opt.name}</span></label>`; 
        });
        html += `</div></div>`;
        
        // 加料
        html += `<div class="option-group"><div class="option-title">加料 (可複選)</div><div class="radio-grid">`;
        sysData.options.toppings.forEach(opt => { 
          let pText = opt.price > 0 ? `(+$${opt.price})` : "";
          html += `<label class="radio-label"><input type="checkbox" name="toppings" value="${opt.name}" data-price="${opt.price}" onchange="updateModalPrice()"><span>${opt.name} ${pText}</span></label>`; 
        });
        html += `</div></div>`;

        document.getElementById("custom-options-container").innerHTML = html;
        document.getElementById("custom-modal").style.display = "flex";
        updateModalPrice();
      }

      function updateModalPrice() {
        let basePrice = Number(document.querySelector('input[name="size"]:checked').dataset.price);
        let toppingsPrice = 0;
        document.querySelectorAll('input[name="toppings"]:checked').forEach(cb => { toppingsPrice += Number(cb.dataset.price); });
        document.getElementById("modal-calc-price").innerText = (basePrice + toppingsPrice) * currentQty;
      }

      function changeQty(delta) { 
        currentQty += delta; 
        if (currentQty < 1) currentQty = 1; 
        document.getElementById("item-qty").innerText = currentQty; 
        updateModalPrice(); 
      }
      
      function closeModal(id) { document.getElementById(id).style.display = "none"; }

      function addToCart() {
        let sizeInput = document.querySelector('input[name="size"]:checked');
        let toppings = []; 
        let toppingsPrice = 0;
        document.querySelectorAll('input[name="toppings"]:checked').forEach(cb => { 
          toppings.push(cb.value); 
          toppingsPrice += Number(cb.dataset.price); 
        });
        
        let unitPrice = Number(sizeInput.dataset.price) + toppingsPrice;

        cart.push({
          name: currentItem.name, 
          size: sizeInput.value,
          sweetness: document.querySelector('input[name="sweetness"]:checked').value,
          ice: document.querySelector('input[name="ice"]:checked').value,
          toppings: toppings, 
          qty: currentQty, 
          unitPrice: unitPrice, 
          total: unitPrice * currentQty
        });
        
        closeModal('custom-modal'); 
        updateCartUI();
      }

      function updateCartUI() {
        if (cart.length > 0) {
          document.getElementById("cart-bar").style.display = "flex";
          let totalQty = 0; let totalPrice = 0;
          cart.forEach(item => { totalQty += item.qty; totalPrice += item.total; });
          document.getElementById("cart-count").innerText = totalQty;
          document.getElementById("cart-total").innerText = totalPrice;
        } else {
          document.getElementById("cart-bar").style.display = "none";
        }
      }

      function openCheckoutModal() {
        let listHtml = ""; 
        let finalTotal = 0;
        cart.forEach(item => {
          finalTotal += item.total;
          let topText = item.toppings.length > 0 ? `+${item.toppings.join('、')}` : "";
          listHtml += `
            <div class="cart-item">
              <div class="cart-item-title">
                <span>[${item.size}] ${item.name} x${item.qty}</span>
                <span>$${item.total}</span>
              </div>
              <div style="font-size:13px; color:#7f8c8d; margin-top:5px;">${item.sweetness}, ${item.ice} ${topText}</div>
            </div>`;
        });
        document.getElementById("checkout-cart-list").innerHTML = listHtml;
        document.getElementById("checkout-total-price").innerText = finalTotal;
        document.getElementById("checkout-modal").style.display = "flex";
      }

      function submitOrder() {
        let lastName = document.getElementById("input-lastname").value.trim();
        let phone = document.getElementById("input-phone").value.trim();
        if (!lastName) return alert("請填寫您的姓氏！"); 
        if (phone.length !== 3) return alert("請填寫手機末三碼！");
        
        let finalTotal = 0; 
        cart.forEach(i => finalTotal += i.total);
        let payload = { 
          userId: userProfile.userId, 
          lineName: userProfile.displayName, 
          lastName: lastName, 
          phone: phone, 
          cart: cart, 
          totalPrice: finalTotal 
        };

        let btn = document.getElementById("btn-submit");
        btn.innerText = "⏳ 傳送中..."; 
        btn.disabled = true;

        callGAS('submitOrder', payload).then(res => {
          if(res.success) {
            alert("訂單送出成功！");
            cart = []; 
            updateCartUI(); 
            closeModal('checkout-modal');
            fetchMyOrders(); // 送出成功後立刻手動刷新一次
          } else {
            alert("送出失敗：" + res.message);
          }
          btn.innerText = "✅ 確認送出訂單"; 
          btn.disabled = false;
        });
      }
    </script>
