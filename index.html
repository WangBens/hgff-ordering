<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>凰貴妃茶堂 - 線上點餐</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: Arial, "Microsoft JhengHei", sans-serif; background: #fcf6f2; margin: 0; padding-bottom: 95px; color: #333; }
    .container { max-width: 640px; margin: auto; background: white; min-height: 100vh; position: relative; }
    .header { text-align: center; color: #d35400; padding: 20px; border-bottom: 1px solid #eee; }
    .header h2 { margin-bottom: 5px; }
    .member-box { margin: 10px 15px; padding: 12px; background: #fff7ec; border-radius: 10px; border: 1px solid #f5d6a8; font-size: 14px; line-height: 1.6; }
    .member-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .member-info { flex: 1; word-break: break-word; }
    .history-btn { background: #3498db; color: white; border: none; padding: 8px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 13px; }
    .join-btn { margin-top: 8px; background: #d35400; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .promo-banner { background: #eef9ff; color: #d35400; font-weight: bold; padding: 12px; font-size: 14px; border-bottom: 2px solid #3498db; text-align: center; line-height: 1.5; }
    .combo-series-box { margin: 10px 15px; padding: 12px; background: #fff8e8; border-left: 5px solid #f39c12; border-radius: 10px; }
    .combo-series-title { font-weight: bold; color: #d35400; margin-bottom: 10px; font-size: 16px; }
    .combo-card { background: white; border: 1px solid #f5d6a8; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .combo-card-name { font-weight: bold; color: #2c3e50; line-height: 1.5; }
    .combo-card-price { color: #e74c3c; font-weight: bold; margin-top: 5px; font-size: 16px; }
    .combo-btn { margin-top: 10px; width: 100%; background: #f39c12; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .store-closed { margin: 15px; padding: 20px; background: #ffeaea; color: #c0392b; border-radius: 10px; text-align: center; font-weight: bold; }
    .category-title { background: #d35400; color: white; padding: 10px 15px; margin-top: 15px; font-weight: bold; }
    .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 10px; }
    .menu-name { font-weight: bold; font-size: 16px; }
    .menu-price { color: #e74c3c; font-size: 14px; margin-top: 5px; }
    .btn-select { background: #f39c12; color: white; border: none; padding: 9px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; white-space: nowrap; }
    .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: white; display: none; justify-content: center; z-index: 999; box-shadow: 0 -3px 10px rgba(0,0,0,0.15); }
    .cart-inner { max-width: 640px; width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    .cart-summary { font-size: 14px; line-height: 1.5; }
    .cart-actions { display: flex; gap: 5px; }
    .cart-btn, .cart-view-btn, .cart-clear { color: white; border: none; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
    .cart-btn { background: #2ecc71; } .cart-view-btn { background: #f39c12; } .cart-clear { background: #95a5a6; }
    
    .status-board { background: #fff; border: 2px solid #d35400; border-radius: 10px; padding: 15px; margin: 15px; }
    .status-title { color: #d35400; font-weight: bold; font-size: 16px; margin-bottom: 10px; border-bottom: 1px dashed #f2e2d9; padding-bottom: 5px; }
    .my-order-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; align-items: center; }
    .my-order-tag { padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 12px; color: white; }
    .tag-red { background: #e74c3c; } .tag-orange { background: #f39c12; } .tag-blue { background: #3498db; }
    
    /* 客製化表單樣式 */
    .option-section { text-align: left; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px dashed #ddd; }
    .option-title { font-weight: bold; color: #d35400; margin-bottom: 8px; font-size: 15px; }
    .choice-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .choice-label input { display: none; }
    .choice-pill { display: inline-block; padding: 8px 12px; border-radius: 999px; border: 1px solid #ccc; background: #fff; font-size: 14px; cursor: pointer; user-select: none; }
    .choice-label input:checked + .choice-pill { background: #d35400; color: white; border-color: #d35400; font-weight: bold; }
    .topping-label input:checked + .choice-pill { background: #8e44ad; border-color: #8e44ad; }
    .qty-control { display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 6px; }
    .qty-btn { width: 42px; height: 42px; border: none; border-radius: 50%; background: #d35400; color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
    .qty-value { min-width: 48px; text-align: center; font-size: 24px; font-weight: bold; color: #2c3e50; }
    
    .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px;}
    .history-table th, .history-table td { border-bottom: 1px solid #eee; padding: 8px 4px; text-align: left;}
  </style>
</head>
<body>
  <div class="container">
    <div id="store-closed-banner" class="store-closed" style="display:none;">⛔ 門市目前休息中，暫不開放點餐 ⛔</div>
    <div id="promo-banner" class="promo-banner" style="display:none;"></div>
    
    <div class="header">
      <h2>凰貴妃茶堂</h2>
      <p>線上專屬點餐系統</p>
    </div>

    <div id="member-box" class="member-box">LINE 驗證中...</div>

    <div id="my-orders-board" class="status-board" style="display:none;">
      <div class="status-title">🔔 製作進度 <span style="font-size:12px; font-weight:normal; float:right; cursor:pointer;" onclick="fetchUserData()">🔄 更新</span></div>
      <div id="my-orders-list"></div>
    </div>

    <div class="menu-section" id="app-content">
      <div style="text-align: center; color: #e67e22; font-weight: bold; padding: 30px 0;" id="status-text">🔄 系統初始化中，請稍候...</div>
      <div id="menu-container"></div>
    </div>
  </div>

  <div id="cart-bar" class="cart-bar">
    <div class="cart-inner">
      <div class="cart-summary">🛒 <span id="cart-count">0</span> 杯 ｜預估 $<span id="cart-total">0</span></div>
      <div class="cart-actions">
        <button class="cart-view-btn" onclick="openCartManager()">購物車</button>
        <button class="cart-btn" onclick="checkout()">結帳去</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚠️ 請確保這是你最新的 GAS 網址 ⚠️
    // ==========================================
    const CUSTOMER_LIFF_ID = "2010243276-yKzFVFFC";
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxo41bcyyfmHkSV9hUDSmBwttT929G0_CQzVZ-Em_vsl0fwTrIgBclpVI3mqloX4l-0/exec";

    let idToken = ""; let lineProfile = null; let cart = [];
    let menuData = []; let optionsData = { sweetness: [], ice: [], toppings: [] }; let promosData = []; let storeStatus = "營業中";
    let userInfo = { isMember: false, balance: 0, name: "" }; let myHistory = [];

    function escapeHTML(str) { return (!str) ? "" : str.toString().replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    function escapeJS(str) { return (!str) ? "" : str.toString().replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, "\\n").replace(/\r/g, "\\r"); }

    async function callGAS(action, payload = {}, options = {}) {
      payload.action = action; payload.idToken = idToken;
      if (options.loading) Swal.fire({ title: options.loadingText || "處理中...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
      try {
        const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
        return await res.json();
      } catch (err) { return { success: false, message: "連線失敗，請稍後再試。" }; }
    }

    window.onload = async function () {
      try {
        await liff.init({ liffId: CUSTOMER_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        idToken = liff.getIDToken(); lineProfile = await liff.getProfile();
        await initUser(); await loadMenu(); await fetchUserData();
      } catch (e) { Swal.fire("錯誤", "LIFF 初始化失敗，請重新開啟", "error"); }
    };

    async function initUser() {
      const res = await callGAS("initUser", { lineName: lineProfile ? lineProfile.displayName : "" });
      if (res.success) { userInfo = res.data; renderMemberBox(); }
    }

    function renderMemberBox() {
      const box = document.getElementById("member-box");
      if (userInfo.isMember) {
        box.innerHTML = `<div class="member-row"><div class="member-info">👤 ${escapeHTML(userInfo.name)}<br>💰 餘額：$${Number(userInfo.balance || 0)}</div><button class="history-btn" onclick="openTransactionHistory()">交易明細</button></div>`;
      } else {
        box.innerHTML = `<div class="member-row"><div class="member-info">👋 歡迎 ${escapeHTML(userInfo.name)}<br>尚未加入專屬會員</div><button class="join-btn" onclick="joinMember()">加入會員</button></div>`;
      }
    }

    async function joinMember() {
      const res = await callGAS("joinMember", { lineName: lineProfile ? lineProfile.displayName : "" }, { loading: true, loadingText: "建檔中..." });
      if (res.success) { userInfo = res.data; renderMemberBox(); Swal.fire("成功", "🎉 恭喜成為專屬會員！", "success"); } 
      else Swal.fire("失敗", res.message, "error");
    }

    function fetchUserData() {
      if (!userInfo.isMember) return;
      callGAS("getUserOrdersAndHistory").then(res => {
        if (!res.success) return;
        myHistory = res.data.history || [];
        const orders = res.data.orders || [];
        if (orders.length > 0) {
          let html = "";
          orders.forEach(o => {
            const tagClass = o.status === "未處理" ? "tag-red" : (o.status === "已接單" ? "tag-orange" : "tag-blue");
            html += `<div class="my-order-item"><div>${escapeHTML(o.time)} 訂單</div><div class="my-order-tag ${tagClass}">${escapeHTML(o.status)}</div></div>`;
          });
          document.getElementById("my-orders-list").innerHTML = html; document.getElementById("my-orders-board").style.display = "block";
        } else { document.getElementById("my-orders-board").style.display = "none"; }
      });
    }

    function openTransactionHistory() {
      let tbody = "";
      if(myHistory.length === 0) tbody = "<tr><td colspan='4' style='text-align:center;'>尚無交易紀錄</td></tr>";
      else {
        myHistory.forEach(h => {
          let color = h.amount > 0 ? '#27ae60' : '#e74c3c';
          let btn = h.type === '消費扣款' && h.orderContent ? `<br><button class="history-btn" style="margin-top:3px; padding:3px 6px;" onclick="showOrderDetails('${encodeURIComponent(h.orderContent)}')">🔍 明細</button>` : '';
          tbody += `<tr><td>${escapeHTML(h.time)}</td><td>${escapeHTML(h.type)}${btn}</td><td style="color:${color};font-weight:bold;">${h.amount>0?'+':''}${h.amount}</td><td>$${h.balance}</td></tr>`;
        });
      }
      Swal.fire({ title: '交易明細', html: `<div style="max-height:60vh;overflow-y:auto;"><table class="history-table"><thead><tr><th>時間</th><th>類型</th><th>金額</th><th>結餘</th></tr></thead><tbody>${tbody}</tbody></table></div>`, confirmButtonText: '關閉' });
    }

    window.showOrderDetails = function(encodedContent) {
       let content = decodeURIComponent(encodedContent).replace(/\n/g, '<br>');
       Swal.fire({ title: '訂單內容', html: `<div style="text-align:left; font-size:15px; line-height:1.6; background:#f9f9f9; padding:10px; border-radius:8px;">${content}</div>`, confirmButtonColor: '#d35400' });
    };

    async function loadMenu() {
      const res = await callGAS("getMenuAndOptions");
      if (res.success) {
        menuData = res.data.menu || []; optionsData = res.data.options; promosData = res.data.promos || []; storeStatus = res.data.storeStatus;
        document.getElementById("status-text").style.display = "none";
        if (storeStatus !== "營業中") { document.getElementById("store-closed-banner").style.display = "block"; }
        renderPromosAndCombos(); renderMenu(); updateCart();
      }
    }

    function renderPromosAndCombos() {
      let comboHtml = ""; let bannerHtml = "";
      promosData.forEach(p => {
        const sizeText = p.sizeLimit !== "不限" ? `[限${escapeHTML(p.sizeLimit)}杯] ` : "";
        if (p.promoMode === "組合價") {
          let tName = p.targetType === "指定組合" ? String(p.targetName).split(",").join(" + ") : p.targetName;
          comboHtml += `
            <div class="combo-card">
              <div class="combo-card-name">🔥 ${escapeHTML(tName)}</div>
              <div class="combo-card-price">套餐價 $${p.comboPrice}</div>
              <div class="combo-card-desc">${escapeHTML(sizeText)} ${p.desc ? '｜'+escapeHTML(p.desc) : ''}<br>※每杯可自選甜度冰塊，加料另計</div>
              ${p.targetType === "指定組合" ? `<button class="combo-btn" onclick="selectComboPromo('${escapeJS(p.id)}')">選擇此套餐</button>` : ''}
            </div>`;
        } else {
          let tag = p.targetType === "全館" ? "【全館】" : `【${escapeHTML(p.targetName)}】`;
          bannerHtml += `📢 ${tag} 買${p.buyQty}送${p.freeQty} ${sizeText} ${p.desc?' - '+escapeHTML(p.desc):''}<br>`;
        }
      });
      const cBox = document.getElementById("menu-container");
      if(comboHtml) cBox.innerHTML += `<div class="combo-series-box"><div class="combo-series-title">👑 今日套餐組合</div>${comboHtml}</div>`;
      if(bannerHtml) { document.getElementById("promo-banner").innerHTML = bannerHtml; document.getElementById("promo-banner").style.display = "block"; }
    }

    function renderMenu() {
      const container = document.getElementById("menu-container");
      if (storeStatus !== "營業中") { container.innerHTML = `<div class="store-closed">門市休息中</div>`; return; }
      const grouped = {};
      menuData.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
      for (let cat in grouped) {
        container.innerHTML += `<div class="category-title">${escapeHTML(cat)}</div>`;
        grouped[cat].forEach(item => {
          let pText = [];
          if (item.priceL > 0) pText.push(`L:$${item.priceL}`); if (item.priceXL > 0) pText.push(`XL:$${item.priceXL}`);
          container.innerHTML += `
            <div class="menu-item">
              <div><div class="menu-name">${escapeHTML(item.name)}</div><div class="menu-price">${escapeHTML(pText.join(" ｜ "))}</div></div>
              <button class="btn-select" onclick="selectItem('${encodeURIComponent(item.name)}')">選擇</button>
            </div>`;
        });
      }
    }

    // --- 客製化表單 ---
    window.changeQty = function(delta) {
      const el = document.getElementById("swal-qty-value"); let next = Number(el.innerText) + delta;
      if (next < 1) next = 1; if (next > 20) next = 20; el.innerText = next;
    };

    function buildItemFormHTML(item, forcedSize = "") {
      let sizeHtml = "";
      if (forcedSize === "L" && item.priceL > 0) sizeHtml += `<label class="choice-label"><input type="radio" name="swal-size" value="L" checked><span class="choice-pill">L 杯 $${item.priceL}</span></label>`;
      else if (forcedSize === "XL" && item.priceXL > 0) sizeHtml += `<label class="choice-label"><input type="radio" name="swal-size" value="XL" checked><span class="choice-pill">XL 杯 $${item.priceXL}</span></label>`;
      else {
        if (item.priceL > 0) sizeHtml += `<label class="choice-label"><input type="radio" name="swal-size" value="L" checked><span class="choice-pill">L 杯 $${item.priceL}</span></label>`;
        if (item.priceXL > 0) sizeHtml += `<label class="choice-label"><input type="radio" name="swal-size" value="XL" ${item.priceL<=0?'checked':''}><span class="choice-pill">XL 杯 $${item.priceXL}</span></label>`;
      }
      
      let sHtml = optionsData.sweetness.map((o,i) => `<label class="choice-label"><input type="radio" name="swal-sweetness" value="${o.name}" ${i===0?'checked':''}><span class="choice-pill">${o.name}</span></label>`).join("");
      let iHtml = optionsData.ice.map((o,i) => `<label class="choice-label"><input type="radio" name="swal-ice" value="${o.name}" ${i===0?'checked':''}><span class="choice-pill">${o.name}</span></label>`).join("");
      let tHtml = optionsData.toppings.map(o => `<label class="choice-label topping-label"><input type="checkbox" name="swal-topping" value="${o.name}"><span class="choice-pill">${o.name} +$${o.price}</span></label>`).join("");

      return `
        <div class="option-section"><div class="option-title">容量</div><div class="choice-grid">${sizeHtml}</div></div>
        <div class="option-section"><div class="option-title">甜度</div><div class="choice-grid">${sHtml}</div></div>
        <div class="option-section"><div class="option-title">冰塊</div><div class="choice-grid">${iHtml}</div></div>
        <div class="option-section"><div class="option-title">加料 (可複選)</div><div class="choice-grid">${tHtml||'<span style="color:#999;">無</span>'}</div></div>
        <div class="option-section"><div class="option-title">數量</div><div class="qty-control"><button type="button" class="qty-btn" onclick="changeQty(-1)">−</button><div id="swal-qty-value" class="qty-value">1</div><button type="button" class="qty-btn" onclick="changeQty(1)">+</button></div></div>
      `;
    }

    function readItemFormValue(item) {
      const sizeEl = document.querySelector('input[name="swal-size"]:checked');
      const tops = []; document.querySelectorAll('input[name="swal-topping"]:checked').forEach(cb => tops.push(cb.value));
      return {
        name: item.name, category: item.category,
        size: sizeEl ? sizeEl.value : "L",
        sweetness: document.querySelector('input[name="swal-sweetness"]:checked').value,
        ice: document.querySelector('input[name="swal-ice"]:checked').value,
        qty: Number(document.getElementById("swal-qty-value").innerText),
        toppings: tops,
        unitPrice: (sizeEl && sizeEl.value === 'XL' ? item.priceXL : item.priceL) + tops.reduce((sum, t) => sum + optionsData.toppings.find(o=>o.name===t).price, 0)
      };
    }

    async function selectItem(encodedName) {
      const item = menuData.find(m => m.name === decodeURIComponent(encodedName));
      const res = await Swal.fire({ title: item.name, html: buildItemFormHTML(item), showCancelButton: true, confirmButtonText: "加入購物車", preConfirm: () => readItemFormValue(item) });
      if (res.isConfirmed && res.value) { cart.push(res.value); updateCart(); Swal.fire("成功", "已加入購物車", "success"); }
    }

    async function selectComboPromo(promoId) {
      const promo = promosData.find(p => String(p.id) === String(promoId));
      const itemNames = promo.targetName.split(",").filter(x => x);
      const comboItems = [];
      const sizeLimit = promo.sizeLimit !== "不限" ? promo.sizeLimit : "";

      for (let i = 0; i < itemNames.length; i++) {
        const menuItem = menuData.find(m => m.name === itemNames[i]);
        if(!menuItem || (sizeLimit==='L'&&menuItem.priceL<=0) || (sizeLimit==='XL'&&menuItem.priceXL<=0)) return Swal.fire('錯誤', `商品「${itemNames[i]}」不符套餐條件`, 'error');
        
        const res = await Swal.fire({ title: `套餐第 ${i + 1} 杯：${menuItem.name}`, html: buildItemFormHTML(menuItem, sizeLimit), showCancelButton: true, confirmButtonText: i === itemNames.length - 1 ? "完成加入" : "設定下一杯", allowOutsideClick: false, preConfirm: () => { let val = readItemFormValue(menuItem); val.qty = 1; return val; } });
        if (!res.isConfirmed) return Swal.fire("已取消", "尚未加入套餐", "info");
        comboItems.push(res.value);
      }
      comboItems.forEach(item => cart.push(item)); updateCart();
      Swal.fire({title:"已加入套餐", text: "已為您成功加入購物車，結帳時將自動套用組合價！", icon:"success"});
    }

    function calculateCart() {
      let flatItems = []; let originalTotal = 0;
      cart.forEach(item => { for(let i=0; i<item.qty; i++){ flatItems.push({ name: item.name, category: item.category, price: item.unitPrice, size: item.size, usedPromo: false }); originalTotal += item.unitPrice; } });
      flatItems.sort((a, b) => b.price - a.price); 
      let discountAmount = 0;

      promosData.forEach(promo => {
        let matchedIndices = [];
        for(let i=0; i<flatItems.length; i++) {
          if(!flatItems[i].usedPromo) {
             if(promo.sizeLimit !== '不限' && flatItems[i].size !== promo.sizeLimit) continue;
             let isMatch = false;
             if(promo.targetType === '全館') isMatch = true;
             else if(promo.targetType === '系列' && flatItems[i].category === promo.targetName) isMatch = true;
             else if(promo.targetType === '單品' && flatItems[i].name === promo.targetName) isMatch = true;
             else if(promo.targetType === '指定組合') { if(promo.targetName.split(',').includes(flatItems[i].name)) isMatch = true; }
             if(isMatch) matchedIndices.push(i);
          }
        }
        if (promo.promoMode === '買X送Y' && (promo.buyQty + promo.freeQty) > 0) {
          let gSize = promo.buyQty + promo.freeQty; let groups = Math.floor(matchedIndices.length / gSize);
          for(let g=0; g<groups; g++) { let cur = matchedIndices.slice(g*gSize, (g+1)*gSize); for(let f = promo.buyQty; f < gSize; f++) discountAmount += flatItems[cur[f]].price; cur.forEach(idx => flatItems[idx].usedPromo = true); }
        } else if (promo.promoMode === '組合價' && promo.buyQty > 0) {
          let groups = Math.floor(matchedIndices.length / promo.buyQty);
          for(let g=0; g<groups; g++) {
            let cur = matchedIndices.slice(g*promo.buyQty, (g+1)*promo.buyQty); let sum = 0; cur.forEach(idx => sum += flatItems[idx].price);
            let disc = sum - promo.comboPrice; if (disc > 0) discountAmount += disc; cur.forEach(idx => flatItems[idx].usedPromo = true);
          }
        }
      });
      return { original: originalTotal, discount: discountAmount, final: originalTotal - discountAmount };
    }

    function updateCart() {
      let count = 0; cart.forEach(i => count += i.qty);
      if (count > 0) {
        document.getElementById("cart-bar").style.display = "flex"; document.body.classList.add("has-cart");
        let calc = calculateCart(); document.getElementById("cart-count").innerText = count; document.getElementById("cart-total").innerText = calc.final;
      } else { document.getElementById("cart-bar").style.display = "none"; document.body.classList.remove("has-cart"); Swal.close(); }
    }

    window.openCartManager = function() {
      let html = `<div style="text-align:left; max-height: 300px; overflow-y:auto; border-top: 1px solid #eee; padding-top:10px;">`;
      cart.forEach((item, index) => {
        let tops = item.toppings.length > 0 ? `+${item.toppings.join("、")}` : "";
        html += `<div style="padding:10px 0; border-bottom:1px dashed #eee;"><b>[${item.size}] ${escapeHTML(item.name)} x${item.qty}</b> <span style="float:right; color:#e74c3c;">$${item.unitPrice * item.qty}</span><div style="font-size:13px; color:#7f8c8d; margin-top:5px;">${item.sweetness}, ${item.ice} ${tops}</div><button style="margin-top:5px; background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="cart.splice(${index},1); updateCart(); openCartManager();">🗑️ 刪除此項</button></div>`;
      });
      html += `</div>`;
      Swal.fire({ title: "我的購物車", html: html, confirmButtonText: "關閉", showCancelButton: true, cancelButtonText: "清空購物車", cancelButtonColor: "#95a5a6" }).then(r => { if(r.dismiss === Swal.DismissReason.cancel) { cart = []; updateCart(); Swal.fire('已清空', '購物車已清空', 'success'); } });
    };

    window.checkout = function() {
      if(storeStatus !== "營業中") return Swal.fire("休息中", "門市目前暫停點餐", "warning");
      let calc = calculateCart();
      let payOpts = userInfo.isMember && userInfo.balance >= calc.final ? `<option value="現場結帳">現場結帳</option><option value="餘額扣款">餘額扣款 (剩餘 $${userInfo.balance})</option>` : `<option value="現場結帳">現場結帳</option><option value="餘額扣款" disabled>餘額扣款 (餘額不足)</option>`;
      let html = `
        <div style="text-align:right; font-weight:bold; font-size:22px; color:#d35400; margin-bottom:15px;">應付總額：$${calc.final}</div>
        ${calc.discount > 0 ? `<div style="text-align:right; font-size:14px; color:#2ecc71; margin-top:-10px; margin-bottom:15px;">(已自動套用活動折抵 $${calc.discount})</div>` : ''}
        <div style="text-align:left; margin-bottom:5px; font-weight:bold;">付款方式</div><select id="co-pay" class="form-control" style="background:#f9f9f9;">${payOpts}</select>
        <div style="text-align:left; margin-bottom:5px; font-weight:bold; margin-top:10px;">姓氏/稱呼</div><input id="co-name" class="form-control" placeholder="例：王先生">
        <div style="text-align:left; margin-bottom:5px; font-weight:bold; margin-top:10px;">手機末三碼</div><input id="co-phone" class="form-control" placeholder="例：123" maxlength="3">
      `;
      Swal.fire({ title: "確認結帳", html: html, showCancelButton: true, confirmButtonText: "送出訂單", preConfirm: () => {
          let n = document.getElementById("co-name").value; let p = document.getElementById("co-phone").value; let py = document.getElementById("co-pay").value;
          if(!n || !/^\d{3}$/.test(p)) { Swal.showValidationMessage("稱呼或手機格式錯誤"); return false; }
          return { n, p, py };
      }}).then(res => {
        if(res.isConfirmed) {
          callGAS("submitOrder", { lineName: lineProfile ? lineProfile.displayName : "", lastName: res.value.n, phone: res.value.p, payMethod: res.value.py, cart: cart }, { loading: true, loadingText: "訂單送出中..." }).then(submitRes => {
            if(submitRes.success) {
               cart = []; updateCart();
               if(submitRes.isMember) userInfo.balance = submitRes.newBalance;
               renderMemberBox(); fetchUserData();
               Swal.fire('成功', '訂單已送出！', 'success');
            } else Swal.fire('錯誤', submitRes.message, 'error');
          });
        }
      });
    };
  </script>
</body>
</html>
